<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>持仓管理 - 我的投资智库</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    .holdings-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }
    .holdings-stats .item { background: var(--card-bg); padding: 14px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .holdings-stats .item .lbl { font-size: 0.8rem; color: var(--text-light); }
    .holdings-stats .item .val { font-size: 1.25rem; font-weight: 700; margin-top: 4px; }
    .holdings-stats .item .val.green { color: var(--success); }
    .holdings-stats .item .val.red { color: var(--danger); }

    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .chart-card { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; box-shadow: var(--shadow); }
    .chart-card h3 { font-size: 0.95rem; margin-bottom: 10px; color: var(--primary); }
    .chart-container { height: 280px; }

    .holdings-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .holdings-table th { background: var(--primary); color: #fff; padding: 11px 14px; text-align: left; font-weight: 500; font-size: 0.85rem; white-space: nowrap; }
    .holdings-table th:first-child { border-radius: var(--radius-sm) 0 0 0; }
    .holdings-table th:last-child { border-radius: 0 var(--radius-sm) 0 0; }
    .holdings-table td { padding: 11px 14px; border-bottom: 1px solid var(--border-light); }
    .holdings-table tr:hover td { background: #f8fafc; }
    .holdings-table .up { color: var(--success); font-weight: 500; }
    .holdings-table .down { color: var(--danger); font-weight: 500; }
    .holdings-table .weight-bar { display: inline-block; height: 6px; background: var(--accent); border-radius: 3px; vertical-align: middle; margin-left: 4px; }

    .concentration-alert { background: #fff8e1; border: 1px solid #ffe082; border-radius: var(--radius-sm); padding: 10px 16px; margin-bottom: 16px; font-size: 0.85rem; color: #f57c00; display: flex; align-items: center; gap: 8px; }
    .concentration-alert.danger { background: #ffebee; border-color: #ffcdd2; color: #c62828; }

    @media (max-width: 768px) {
      .charts-row { grid-template-columns: 1fr; }
      .chart-container { height: 240px; }
      .holdings-table { font-size: 0.8rem; }
      .holdings-table th, .holdings-table td { padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">
      <div class="icon">📊</div>
      <span>我的投资智库</span>
    </div>
    <button class="hamburger" aria-label="菜单">☰</button>
    <nav class="nav" id="mainNav">
      <a href="index.html">首页</a>
      <a href="knowledge.html">知识库</a>
      <a href="strategy.html">策略池</a>
      <a href="portfolio.html" class="active">持仓管理</a>
      <a href="watchlist.html">自选股</a>
      <a href="trade.html">交易复盘</a>
    </nav>
    <button class="btn-data" onclick="openModal('dataModal')" title="数据管理">💾</button>
  </header>

  <main class="container">
    <div class="section-header">
      <h2>💼 持仓管理</h2>
      <div class="actions">
        <button class="btn btn-outline" onclick="refreshPrices()">🔄 刷新行情</button>
        <button class="btn btn-primary" onclick="openSnapshotModal()">📝 录入每日快照</button>
      </div>
    </div>

    <!-- 概览 -->
    <div class="holdings-stats" id="holdingsStats"></div>

    <!-- 集中度预警 -->
    <div id="concentrationAlert"></div>

    <!-- 图表 -->
    <div class="charts-row">
      <div class="chart-card">
        <h3>📊 持仓市值占比</h3>
        <div class="chart-container" id="weightChart"></div>
      </div>
      <div class="chart-card">
        <h3>🏭 行业分布</h3>
        <div class="chart-container" id="industryChart"></div>
      </div>
    </div>

    <!-- 持仓明细 -->
    <div class="card" style="padding:0;">
      <div style="overflow-x:auto;">
        <table class="holdings-table" id="holdingsTable">
          <thead>
            <tr>
              <th>股票名称</th>
              <th>代码</th>
              <th>持仓量</th>
              <th>成本价</th>
              <th>现价</th>
              <th>市值</th>
              <th>占比</th>
              <th>浮动盈亏</th>
              <th>盈亏率</th>
              <th>行业</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="holdingsBody"></tbody>
        </table>
      </div>
      <div id="holdingsEmpty" class="empty-state" style="display:none;">
        <div class="icon">💼</div>
        <p>暂无持仓数据，请先录入每日快照</p>
      </div>
    </div>
  </main>

  <!-- 录入快照模态框 -->
  <div class="modal-overlay" id="snapshotModal">
    <div class="modal" style="max-width:680px;">
      <div class="modal-header">
        <h3>📝 录入每日快照</h3>
        <button class="modal-close" onclick="closeModal('snapshotModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>快照日期</label>
          <input type="date" id="snapshotDate">
        </div>
        <div class="form-group">
          <label>现金（元）</label>
          <input type="number" id="snapshotCash" step="0.01" placeholder="如：50000">
        </div>
        <hr style="margin:16px 0;border:none;border-top:1px solid var(--border);">
        <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:12px;">持仓明细（可添加多只股票）</p>
        <div id="positionsList"></div>
        <button class="btn btn-outline btn-sm" onclick="addPositionRow()" style="margin-top:8px;">＋ 添加持仓</button>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('snapshotModal')">取消</button>
        <button class="btn btn-primary" onclick="saveSnapshot()">保存快照</button>
      </div>
    </div>
  </div>

  <!-- 数据管理 -->
  <div class="modal-overlay" id="dataModal">
    <div class="modal" style="max-width:480px;">
      <div class="modal-header">
        <h3>💾 数据管理</h3>
        <button class="modal-close" onclick="closeModal('dataModal')">✕</button>
      </div>
      <div class="modal-body">
        <p class="data-info">
          <b>🌐 自动同步</b>：页面右下角点同步按钮，输入 GitHub Token 即可开启跨设备云同步。<br>
          <b>📁 手动传输</b>：也可通过下方导出/导入在设备间迁移数据。
        </p>
        <div class="data-actions">
          <button class="btn btn-primary" onclick="closeModal('dataModal');exportAllData();"><span class="btn-icon">⬇️</span><br>导出数据</button>
          <button class="btn btn-outline" onclick="closeModal('dataModal');importAllData();"><span class="btn-icon">⬆️</span><br>导入数据</button>
        </div>
        <div class="data-warn">⚠️ 导入数据将覆盖当前设备上的所有数据，建议先导出备份再导入。</div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="js/app.js"></script>
  <script src="js/charts.js"></script>
  <script>
    let editingPositions = [];

    // 行情批量获取
    async function fetchBatchPrices(codes) {
      if (!codes.length) return {};
      const result = {};
      // 东方财富 push2 API 批量
      const fields = 'f2,f3,f12,f14';
      const secids = codes.map(c => (c.startsWith('6') ? '1.' : '0.') + c).join(',');
      const url = `https://push2.eastmoney.com/api/qt/ulist.np/get?secids=${secids}&fields=${fields}&fltt=2&_=${Date.now()}`;
      try {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 8000);
        const resp = await fetch(url, { signal: ctrl.signal });
        clearTimeout(timer);
        const json = await resp.json();
        (json?.data?.diff || []).forEach(s => {
          result[s.f12] = { price: parseFloat(s.f2), percent: parseFloat(s.f3) };
        });
      } catch(e) { console.error('行情获取失败', e); }
      return result;
    }

    async function refreshPrices() {
      const snap = DB.getLatestSnapshot();
      if (!snap || !snap.positions?.length) {
        showToast('暂无持仓，请先录入快照');
        return;
      }
      showToast('正在刷新行情...');
      const codes = snap.positions.map(p => p.stockCode).filter(Boolean);
      const prices = await fetchBatchPrices(codes);

      // 更新快照中的现价
      snap.positions.forEach(p => {
        if (prices[p.stockCode]) {
          p.currentPrice = prices[p.stockCode].price;
          p.marketValue = parseFloat((p.currentPrice * p.shares).toFixed(2));
          p.profitLoss = parseFloat(((p.currentPrice - p.costPrice) * p.shares).toFixed(2));
          p.profitLossRate = parseFloat(((p.currentPrice / p.costPrice - 1) * 100).toFixed(2));
        }
      });
      // 重算总资产和占比
      const totalMarketValue = snap.positions.reduce((s, p) => s + p.marketValue, 0);
      snap.totalAssets = parseFloat((totalMarketValue + snap.cash).toFixed(2));
      snap.positions.forEach(p => {
        p.weight = parseFloat(((p.marketValue / snap.totalAssets) * 100).toFixed(2));
      });
      // 更新快照
      const list = DB.getSnapshots();
      const idx = list.findIndex(s => s.id === snap.id);
      if (idx >= 0) { list[idx] = snap; DB.setSnapshots(list); }
      renderHoldings();
      showToast('✅ 行情已刷新');
    }

    function renderHoldings() {
      const snap = DB.getLatestSnapshot();
      const statsEl = document.getElementById('holdingsStats');
      const body = document.getElementById('holdingsBody');
      const empty = document.getElementById('holdingsEmpty');
      const alertEl = document.getElementById('concentrationAlert');

      if (!snap || !snap.positions?.length) {
        statsEl.innerHTML = '<div class="item"><div class="lbl">暂无数据</div><div class="val">—</div></div>';
        body.innerHTML = '';
        empty.style.display = 'block';
        alertEl.innerHTML = '';
        Charts.dispose('weightChart');
        Charts.dispose('industryChart');
        return;
      }
      empty.style.display = 'none';

      // 统计
      const totalMarketValue = snap.positions.reduce((s, p) => s + (p.marketValue || 0), 0);
      const totalCost = snap.positions.reduce((s, p) => s + (p.costPrice || 0) * (p.shares || 0), 0);
      const totalProfit = totalMarketValue - totalCost;
      const profitRate = totalCost > 0 ? (totalProfit / totalCost * 100) : 0;

      statsEl.innerHTML = `
        <div class="item"><div class="lbl">总资产</div><div class="val">¥${(snap.totalAssets||0).toLocaleString('zh-CN',{maximumFractionDigits:0})}</div></div>
        <div class="item"><div class="lbl">持仓市值</div><div class="val">¥${totalMarketValue.toLocaleString('zh-CN',{maximumFractionDigits:0})}</div></div>
        <div class="item"><div class="lbl">现金</div><div class="val">¥${(snap.cash||0).toLocaleString('zh-CN',{maximumFractionDigits:0})}</div></div>
        <div class="item"><div class="lbl">浮动盈亏</div><div class="val ${totalProfit>=0?'green':'red'}">${totalProfit>=0?'+':''}¥${totalProfit.toLocaleString('zh-CN',{maximumFractionDigits:0})}</div></div>
        <div class="item"><div class="lbl">收益率</div><div class="val ${profitRate>=0?'green':'red'}">${profitRate>=0?'+':''}${profitRate.toFixed(2)}%</div></div>
      `;

      // 集中度预警
      const maxWeight = Math.max(...snap.positions.map(p => p.weight || 0));
      const industryMap = {};
      snap.positions.forEach(p => {
        const ind = p.industry || '其他';
        industryMap[ind] = (industryMap[ind] || 0) + (p.marketValue || 0);
      });
      const maxIndustryPct = Math.max(...Object.values(industryMap).map(v => v / totalMarketValue * 100));
      let alerts = [];
      if (maxWeight > 30) alerts.push(`单只股票占比过高：${maxWeight.toFixed(1)}% > 30%`);
      if (maxIndustryPct > 50) alerts.push(`单行业集中度偏高：${maxIndustryPct.toFixed(1)}% > 50%`);
      alertEl.innerHTML = alerts.length
        ? `<div class="concentration-alert ${maxWeight>50||maxIndustryPct>70?'danger':''}">⚠️ ${alerts.join('；')}，建议适当分散</div>`
        : '';

      // 表格
      body.innerHTML = snap.positions.map(p => {
        const plCls = (p.profitLoss||0) >= 0 ? 'up' : 'down';
        const plStr = (p.profitLoss||0) >= 0 ? '+' : '';
        return `<tr>
          <td><strong>${p.stockName||'-'}</strong></td>
          <td style="font-size:0.82rem;color:var(--text-light);">${p.stockCode||'-'}</td>
          <td>${p.shares||0}</td>
          <td>¥${(p.costPrice||0).toFixed(2)}</td>
          <td>¥${(p.currentPrice||0).toFixed(2)}</td>
          <td>¥${(p.marketValue||0).toLocaleString('zh-CN',{maximumFractionDigits:0})}</td>
          <td>${(p.weight||0).toFixed(1)}% <span class="weight-bar" style="width:${Math.min((p.weight||0)*2,40)}px"></span></td>
          <td class="${plCls}">${plStr}¥${Math.abs(p.profitLoss||0).toLocaleString('zh-CN',{maximumFractionDigits:0})}</td>
          <td class="${plCls}">${plStr}${(p.profitLossRate||0).toFixed(2)}%</td>
          <td style="font-size:0.82rem;">${p.industry||'-'}</td>
          <td><button class="btn btn-sm btn-outline" onclick="window.open('https://quote.eastmoney.com/${(p.stockCode||'').startsWith('6')?'sh':'sz'}${p.stockCode}.html','_blank')">详情</button></td>
        </tr>`;
      }).join('');

      // 图表：市值占比饼图
      Charts.pie('weightChart', snap.positions.map(p => ({
        name: p.stockName,
        value: parseFloat((p.marketValue||0).toFixed(0)),
      })));

      // 图表：行业分布饼图
      Charts.pie('industryChart', Object.entries(industryMap).map(([name, value]) => ({
        name,
        value: parseFloat(value.toFixed(0)),
      })));
    }

    // ===== 快照录入 =====
    function openSnapshotModal() {
      document.getElementById('snapshotDate').value = new Date().toISOString().slice(0, 10);
      document.getElementById('snapshotCash').value = '';
      // 预填上次持仓
      const last = DB.getLatestSnapshot();
      editingPositions = last ? last.positions.map(p => ({ ...p })) : [];
      if (editingPositions.length === 0) editingPositions = [{ stockName:'', stockCode:'', shares:'', costPrice:'', currentPrice:'', industry:'' }];
      renderPositionRows();
      openModal('snapshotModal');
    }

    function renderPositionRows() {
      const list = document.getElementById('positionsList');
      list.innerHTML = editingPositions.map((p, i) => `
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:end;">
          <div><label style="font-size:0.75rem;color:var(--text-light);">名称</label><input type="text" value="${p.stockName||''}" onchange="updatePos(${i},'stockName',this.value)" placeholder="中联重科"></div>
          <div><label style="font-size:0.75rem;color:var(--text-light);">代码</label><input type="text" value="${p.stockCode||''}" onchange="updatePos(${i},'stockCode',this.value)" placeholder="000157"></div>
          <div><label style="font-size:0.75rem;color:var(--text-light);">股数</label><input type="number" value="${p.shares||''}" onchange="updatePos(${i},'shares',this.value)" placeholder="1000"></div>
          <div><label style="font-size:0.75rem;color:var(--text-light);">成本价</label><input type="number" step="0.01" value="${p.costPrice||''}" onchange="updatePos(${i},'costPrice',this.value)" placeholder="7.64"></div>
          <div><label style="font-size:0.75rem;color:var(--text-light);">现价</label><input type="number" step="0.01" value="${p.currentPrice||''}" onchange="updatePos(${i},'currentPrice',this.value)" placeholder="8.20"></div>
          <div><label style="font-size:0.75rem;color:var(--text-light);">&nbsp;</label><button class="btn btn-sm btn-outline" onclick="removePos(${i})">✕</button></div>
          <div style="grid-column:1/-1;"><label style="font-size:0.75rem;color:var(--text-light);">行业</label><input type="text" value="${p.industry||''}" onchange="updatePos(${i},'industry',this.value)" placeholder="如：工程机械"></div>
        </div>
      `).join('');
    }

    function addPositionRow() {
      editingPositions.push({ stockName:'', stockCode:'', shares:'', costPrice:'', currentPrice:'', industry:'' });
      renderPositionRows();
    }

    function updatePos(i, field, val) {
      if (editingPositions[i]) editingPositions[i][field] = val;
    }

    function removePos(i) {
      editingPositions.splice(i, 1);
      if (editingPositions.length === 0) editingPositions.push({ stockName:'', stockCode:'', shares:'', costPrice:'', currentPrice:'', industry:'' });
      renderPositionRows();
    }

    function saveSnapshot() {
      const date = document.getElementById('snapshotDate').value;
      const cash = parseFloat(document.getElementById('snapshotCash').value) || 0;
      if (!date) { showToast('请选择日期'); return; }

      const validPositions = editingPositions.filter(p => p.stockName && p.shares && p.costPrice);
      if (validPositions.length === 0) { showToast('至少录入一条持仓'); return; }

      // 计算市值和占比
      const positions = validPositions.map(p => {
        const shares = parseInt(p.shares);
        const costPrice = parseFloat(p.costPrice);
        const currentPrice = parseFloat(p.currentPrice || p.costPrice);
        const marketValue = currentPrice * shares;
        return {
          stockName: p.stockName, stockCode: p.stockCode || '',
          shares, costPrice, currentPrice, marketValue,
          industry: p.industry || '其他',
          profitLoss: (currentPrice - costPrice) * shares,
          profitLossRate: (currentPrice / costPrice - 1) * 100,
        };
      });
      const totalMarketValue = positions.reduce((s, p) => s + p.marketValue, 0);
      const totalAssets = totalMarketValue + cash;
      positions.forEach(p => { p.weight = p.marketValue / totalAssets * 100; });

      DB.addSnapshot({ date, totalAssets, cash, positions });
      closeModal('snapshotModal');
      renderHoldings();
      showToast('✅ 快照已保存');
    }

    // 初始化
    DB.initSampleData();
    renderHoldings();
    // 自动刷新行情
    setTimeout(refreshPrices, 500);
  </script>
</body>
</html>
