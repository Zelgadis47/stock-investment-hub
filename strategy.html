<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>策略池 - 我的投资智库</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .strategy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .strategy-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 20px;
      transition: box-shadow 0.2s, transform 0.2s;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .strategy-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
    .strategy-card .s-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .strategy-card .s-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--primary);
      flex: 1;
    }
    .strategy-card .s-status {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 500;
      white-space: nowrap;
      margin-left: 8px;
    }
    .s-status.tracking { background: #e3f2fd; color: #1565c0; }
    .s-status.executed { background: #e8f5e9; color: #2e7d32; }
    .s-status.abandoned { background: #fce4ec; color: #c62828; }

    .strategy-card .s-logic {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: 12px;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .strategy-card .s-condition {
      font-size: 0.82rem;
      color: var(--text-light);
      background: var(--bg);
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
    }
    .strategy-card .s-condition::before { content: '适用条件：'; font-weight: 500; color: var(--text-secondary); }
    .strategy-card .s-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-light);
      border-top: 1px solid var(--border-light);
      padding-top: 10px;
      margin-top: auto;
    }
    .strategy-card .s-actions { display: flex; gap: 6px; }
    .strategy-card .s-actions button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--text-light);
      padding: 3px 6px;
      border-radius: 3px;
      transition: all 0.15s;
    }
    .strategy-card .s-actions .edit:hover { color: var(--accent); background: var(--accent-light); }
    .strategy-card .s-actions .del:hover { color: var(--danger); background: #ffebee; }
    .strategy-card .s-actions .match {
      color: var(--accent); font-weight: 500; font-size: 0.82rem;
      padding: 4px 10px; border: 1px solid var(--accent); border-radius: 12px;
    }
    .strategy-card .s-actions .match:hover { background: var(--accent); color: #fff; }

    /* Match results */
    .match-result-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .match-result-table th { background: var(--primary); color: #fff; padding: 10px 12px; text-align: left; font-weight: 500; font-size: 0.8rem; position: sticky; top: 0; z-index: 1; }
    .match-result-table th:first-child { border-radius: var(--radius-sm) 0 0 0; }
    .match-result-table th:last-child { border-radius: 0 var(--radius-sm) 0 0; }
    .match-result-table td { padding: 9px 12px; border-bottom: 1px solid var(--border-light); }
    .match-result-table tr:hover td { background: #f8fafc; }
    .match-result-table .up { color: var(--danger); font-weight: 500; }
    .match-result-table .down { color: var(--success); font-weight: 500; }

    .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .strategy-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">
      <div class="icon">📊</div>
      <span>我的投资智库</span>
    </div>
    <button class="hamburger" aria-label="菜单">☰</button>
    <nav class="nav" id="mainNav">
      <a href="index.html">首页</a>
      <a href="knowledge.html">知识库</a>
      <a href="strategy.html" class="active">策略池</a>
      <a href="portfolio.html">持仓管理</a>
      <a href="watchlist.html">自选股</a>
      <a href="trade.html">交易复盘</a>
      <a href="diary.html">日记</a>
      <a href="news.html">资讯</a>
      <a href="risk.html">风控</a>
    </nav>
    <button class="btn-data" onclick="openModal('dataModal')" title="数据管理">💾</button>
  </header>

  <main class="container">
    <div class="section-header">
      <h2>📋 策略池</h2>
      <div class="actions">
        <button class="btn btn-primary" onclick="openAddModal()">＋ 新增策略</button>
      </div>
    </div>

    <!-- Filter & Search -->
    <div class="filter-bar">
      <select id="statusFilter" onchange="renderStrategies()">
        <option value="全部">全部状态</option>
        <option value="跟踪中">跟踪中</option>
        <option value="已执行">已执行</option>
        <option value="已废弃">已废弃</option>
      </select>
      <input type="text" id="searchInput" placeholder="搜索策略名称或逻辑关键词…" oninput="renderStrategies()">
    </div>

    <!-- Grid -->
    <div class="strategy-grid" id="strategyGrid"></div>
  </main>

  <!-- ===== Add / Edit Strategy Modal ===== -->
  <div class="modal-overlay" id="strategyModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="strategyModalTitle">新增策略</h3>
        <button class="modal-close" onclick="closeModal('strategyModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>策略名称</label>
          <input type="text" id="strategyName" placeholder="例如：低估值龙头定投策略">
        </div>
        <div class="form-group">
          <label>核心逻辑（一句话概括）</label>
          <textarea id="strategyLogic" rows="3" placeholder="描述策略的核心思路和操作规则"></textarea>
        </div>
        <div class="form-group">
          <label>适用条件</label>
          <textarea id="strategyCondition" rows="2" placeholder="该策略在什么市场环境下有效？"></textarea>
        </div>
        <div class="form-group">
          <label>当前状态</label>
          <select id="strategyStatus">
            <option value="跟踪中">跟踪中</option>
            <option value="已执行">已执行</option>
            <option value="已废弃">已废弃</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('strategyModal')">取消</button>
        <button class="btn btn-primary" onclick="saveStrategy()">保存</button>
      </div>
    </div>
  </div>

  <!-- ===== 匹配股票模态框 ===== -->
  <div class="modal-overlay" id="matchModal">
    <div class="modal" style="max-width:780px;">
      <div class="modal-header">
        <h3>🔍 <span id="matchTitle">策略匹配</span></h3>
        <button class="modal-close" onclick="closeModal('matchModal')">✕</button>
      </div>
      <div class="modal-body">
        <div id="matchLoading" style="text-align:center;padding:40px;">
          <span class="loading-spinner"></span> 正在从市场筛选符合条件的股票...
        </div>
        <div id="matchResults" style="display:none;">
          <div style="font-size:0.85rem;color:var(--text-light);margin-bottom:8px;">
            筛选条件：<span id="matchCondition" style="color:var(--text);font-weight:500;"></span>
          </div>
          <div style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:12px;">
            数据来源：东方财富，结果仅供参考，不构成投资建议。点击行可查看详情。
          </div>
          <div style="max-height:420px;overflow:auto;border:1px solid var(--border);border-radius:var(--radius-sm);">
            <table class="match-result-table" id="matchTable">
              <thead><tr><th>名称</th><th>代码</th><th>最新价</th><th>涨跌幅</th><th>关键指标</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
          <div id="matchEmpty" class="empty-state" style="display:none;padding:24px;">
            <div class="icon">📭</div><p>当前市场暂未找到符合条件股票</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- ===== 数据管理模态框 ===== -->
  <div class="modal-overlay" id="dataModal">
    <div class="modal" style="max-width:480px;">
      <div class="modal-header">
        <h3>💾 数据管理</h3>
        <button class="modal-close" onclick="closeModal('dataModal')">✕</button>
      </div>
      <div class="modal-body">
        <p class="data-info">
          <b>🌐 自动同步</b>：页面右下角有同步状态指示器，点击可配置同步服务器地址。<br>
          <b>📁 手动传输</b>：如不使用同步服务器，可通过下方导出/导入迁移数据。
        </p>
        <div class="data-actions">
          <button class="btn btn-primary" onclick="closeModal('dataModal');exportAllData();">
            <span class="btn-icon">⬇️</span><br>导出数据
          </button>
          <button class="btn btn-outline" onclick="closeModal('dataModal');importAllData();">
            <span class="btn-icon">⬆️</span><br>导入数据
          </button>
        </div>
        <div class="data-warn">⚠️ 导入数据将覆盖当前设备上的所有数据，建议先导出备份再导入。</div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let editingStrategyId = null;

    function renderStrategies() {
      const statusFilter = document.getElementById('statusFilter').value;
      const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

      let list = DB.getStrategies();
      if (statusFilter !== '全部') list = list.filter(s => s.status === statusFilter);
      if (keyword) list = list.filter(s =>
        s.name.toLowerCase().includes(keyword) ||
        (s.logic && s.logic.toLowerCase().includes(keyword))
      );

      const grid = document.getElementById('strategyGrid');
      if (list.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="icon">📋</div><p>暂无策略</p></div>';
        return;
      }

      const statusMap = { '跟踪中': 'tracking', '已执行': 'executed', '已废弃': 'abandoned' };
      grid.innerHTML = list.map(s => `
        <div class="strategy-card">
          <div class="s-header">
            <div class="s-name">${s.name}</div>
            <span class="s-status ${statusMap[s.status] || 'tracking'}">${s.status}</span>
          </div>
          <div class="s-logic">${s.logic || '暂无描述'}</div>
          ${s.condition ? `<div class="s-condition">${s.condition}</div>` : ''}
          <div class="s-footer">
            <span>创建于 ${fmtDate(s.createdAt)}</span>
            <div class="s-actions">
              <button class="match" onclick="event.stopPropagation();matchStrategy('${s.id}')">🔍 匹配</button>
              <button class="edit" onclick="editStrategy('${s.id}')">✏️</button>
              <button class="del" onclick="deleteStrategy('${s.id}')">🗑️</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openAddModal() {
      editingStrategyId = null;
      document.getElementById('strategyModalTitle').textContent = '新增策略';
      document.getElementById('strategyName').value = '';
      document.getElementById('strategyLogic').value = '';
      document.getElementById('strategyCondition').value = '';
      document.getElementById('strategyStatus').value = '跟踪中';
      openModal('strategyModal');
      setTimeout(() => document.getElementById('strategyName').focus(), 100);
    }

    function editStrategy(id) {
      const list = DB.getStrategies();
      const s = list.find(item => item.id === id);
      if (!s) return;
      editingStrategyId = id;
      document.getElementById('strategyModalTitle').textContent = '编辑策略';
      document.getElementById('strategyName').value = s.name;
      document.getElementById('strategyLogic').value = s.logic || '';
      document.getElementById('strategyCondition').value = s.condition || '';
      document.getElementById('strategyStatus').value = s.status;
      openModal('strategyModal');
    }

    function saveStrategy() {
      const name = document.getElementById('strategyName').value.trim();
      const logic = document.getElementById('strategyLogic').value.trim();
      const condition = document.getElementById('strategyCondition').value.trim();
      const status = document.getElementById('strategyStatus').value;

      if (!name) { showToast('请输入策略名称'); return; }
      if (!logic) { showToast('请输入策略核心逻辑'); return; }

      if (editingStrategyId) {
        DB.updateStrategy(editingStrategyId, { name, logic, condition, status });
        showToast('策略已更新');
      } else {
        DB.addStrategy({ name, logic, condition, status });
        showToast('策略已添加');
      }
      closeModal('strategyModal');
      renderStrategies();
    }

    function deleteStrategy(id) {
      if (!confirm('确定要删除这个策略吗？')) return;
      DB.deleteStrategy(id);
      renderStrategies();
      showToast('策略已删除');
    }

    // ===== 策略匹配股票（多因子量化筛选） =====

    // 东方财富 API 字段说明
    // f2:最新价 f3:涨跌幅 f4:涨跌额 f5:成交量 f6:成交额
    // f8:换手率 f9:市盈率(动态) f10:量比 f12:代码 f14:名称
    // f15:最高 f16:最低 f17:今开 f18:昨收
    // f20:总市值 f21:流通市值 f23:市净率
    // f37:股息率 f62:主力净流入(万元)

    const CACHE_TTL = 180000; // 3分钟缓存

    async function fetchStockData(cacheKey) {
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        try {
          const { data, ts } = JSON.parse(cached);
          if (Date.now() - ts < CACHE_TTL) return data;
        } catch(e) {}
      }
      // 获取全市场A股数据（所有关键字段）
      const fields = 'f2,f3,f4,f8,f9,f10,f12,f14,f20,f23,f37,f62';
      const url = `https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=300&po=0&np=1&fltt=2&invt=2&fid=f3&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23&fields=${fields}&_=${Date.now()}`;
      try {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 12000);
        const resp = await fetch(url, { signal: ctrl.signal });
        clearTimeout(timer);
        const text = await resp.text();
        const json = JSON.parse(text);
        const data = json?.data?.diff || [];
        if (data.length) {
          localStorage.setItem(cacheKey, JSON.stringify({ data, ts: Date.now() }));
        }
        return data;
      } catch(e) {
        console.error('API请求失败:', e.message);
        // 如果有缓存就用缓存（即使过期）
        if (cached) {
          try { return JSON.parse(cached).data; } catch(e2) {}
        }
        return [];
      }
    }

    function fmtPct(v) {
      const n = parseFloat(v);
      if (isNaN(n)) return '-';
      const cls = n > 0 ? 'up' : (n < 0 ? 'down' : '');
      return `<span class="${cls}">${n > 0 ? '+' : ''}${n.toFixed(2)}%</span>`;
    }

    function fmtNum(v, unit = '') {
      const n = parseFloat(v);
      if (isNaN(n)) return '-';
      if (Math.abs(n) >= 1e8) return (n / 1e8).toFixed(2) + '亿' + unit;
      if (Math.abs(n) >= 1e4) return (n / 1e4).toFixed(2) + '万' + unit;
      return n.toFixed(1) + unit;
    }

    function fmtPE(v) { const n = parseFloat(v); return n > 0 ? n.toFixed(1) : '—'; }

    // 多因子评分引擎
    function scoreStock(stock, rules) {
      let score = 0;
      for (const rule of rules) {
        const val = parseFloat(stock[rule.field]) || 0;
        if (rule.condition(val)) score += rule.weight;
      }
      return score;
    }

    function matchStrategy(id) {
      const list = DB.getStrategies();
      const s = list.find(item => item.id === id);
      if (!s) return;
      document.getElementById('matchTitle').textContent = s.name + ' — 匹配股票';
      document.getElementById('matchCondition').textContent = s.logic || '通用筛选';
      document.getElementById('matchLoading').style.display = 'block';
      document.getElementById('matchResults').style.display = 'none';
      openModal('matchModal');
      doMatch(s.name, s.logic || '');
    }

    // ===== 策略条件库（参� InStock & Quantitative-Trading-System 量化选股逻辑） =====

    // 条件权重标准化：所有策略满分100
    function normalizeScore(scored, maxRaw) {
      if (maxRaw <= 0) return scored;
      return scored.map(s => ({ ...s, _score: Math.round(s._score / maxRaw * 100) }));
    }

    async function doMatch(name, logic) {
      const stocks = await fetchStockData('full_stock_data');
      if (!stocks.length) {
        document.getElementById('matchLoading').innerHTML = '<p style="color:var(--danger);">❌ 数据获取失败，请稍后重试</p>';
        return;
      }

      const kw = (name + logic).toLowerCase();
      let strategyName, resultColumns, hardFilters, scoreRules, sortColumns;

      // ===== 策略规则集（参考 GitHub 量化项目设计） =====

      if (kw.includes('超跌') || kw.includes('回调') || kw.includes('反弹')) {
        strategyName = '超跌反弹策略';
        resultColumns = ['名称','代码','现价','跌幅','主力净流入','量比','PE','总市值'];
        sortColumns = ['跌幅','主力净流入','量比'];
        hardFilters = [
          { field:'f3', test: v => v < -3, name:'跌幅>3%', fail:'跌幅不足' },
          { field:'f9', test: v => v > 0, name:'盈利公司', fail:'亏损' },
        ];
        scoreRules = [
          { field:'f3', group:'跌幅', weight:40,
            score: v => Math.min(40, Math.abs(Math.max(v, -15)) * 2.5), desc:'跌幅打分（越跌权重越高，上限40分）' },
          { field:'f62', group:'资金', weight:35,
            score: v => v > 0 ? Math.min(35, v / 800 + 5) : Math.max(0, v / 200 + 5), desc:'主力资金（流入加分，流出减分）' },
          { field:'f10', group:'量能', weight:15,
            score: v => v >= 0.5 ? Math.min(15, v * 5) : 0, desc:'量比（≥0.5才有活跃度分）' },
          { field:'f20', group:'基本面', weight:10,
            score: v => v > 3e8 ? Math.min(10, Math.log10(v / 1e8) * 2) : 3, desc:'市值规模' },
        ];
      } else if (kw.includes('股息') || kw.includes('红利')) {
        strategyName = '高股息红利策略';
        resultColumns = ['名称','代码','现价','股息率','市盈率','主力净流入','总市值'];
        sortColumns = ['股息率','市盈率'];
        hardFilters = [
          { field:'f37', test: v => v > 0, name:'有分红', fail:'无分红' },
          { field:'f9', test: v => v > 0 && v < 100, name:'PE合理', fail:'PE异常' },
        ];
        scoreRules = [
          { field:'f37', group:'股息', weight:45, score: v => Math.min(45, v * 8), desc:'股息率越高越好（股息率×8，上限45分）' },
          { field:'f9', group:'估值', weight:25, score: v => v > 0 ? Math.max(0, 25 - v * 0.8) : 0, desc:'PE越低越好（PE每增1扣0.8分）' },
          { field:'f20', group:'规模', weight:15, score: v => v > 1e9 ? Math.min(15, Math.log10(v / 1e8) - 0.5) : 5, desc:'市值越大越稳' },
          { field:'f62', group:'资金', weight:15, score: v => v > -500 ? Math.min(15, (v + 500) / 200) : 0, desc:'资金面不差才加分' },
        ];
      } else if (kw.includes('放量') || kw.includes('量能')) {
        strategyName = '放量上涨策略';
        resultColumns = ['名称','代码','现价','涨跌幅','量比','换手率','主力净流入','市值'];
        sortColumns = ['量比','涨跌幅'];
        hardFilters = [
          { field:'f3', test: v => v > 0, name:'上涨', fail:'未涨' },
          { field:'f10', test: v => v > 1.0, name:'放量', fail:'量比不足' },
        ];
        scoreRules = [
          { field:'f10', group:'量能', weight:30, score: v => Math.min(30, v * 5), desc:'量比（1.0=5分, 6.0+=30满分）' },
          { field:'f3', group:'涨幅', weight:25, score: v => Math.min(25, v * 4), desc:'涨幅（2%=8分, 6%+=24分）' },
          { field:'f62', group:'资金', weight:25, score: v => v > 0 ? Math.min(25, v / 400 + 3) : 0, desc:'主力净流入（1000万≈5分, 1亿=25分）' },
          { field:'f8', group:'活跃', weight:10, score: v => v > 1 && v < 30 ? Math.min(10, v) : 3, desc:'换手率适中' },
          { field:'f20', group:'规模', weight:10, score: v => v > 3e9 ? Math.min(10, Math.log10(v / 1e8) - 1) : 3, desc:'市值规模' },
        ];
      } else if (kw.includes('低估值') || kw.includes('市盈率') || (kw.includes('pe') && !kw.includes('pet'))) {
        strategyName = '低估值龙头策略';
        resultColumns = ['名称','代码','现价','市盈率','市净率','股息率','主力净流入','总市值'];
        sortColumns = ['市盈率','股息率'];
        hardFilters = [
          { field:'f9', test: v => v > 0, name:'盈利', fail:'亏损' },
          { field:'f20', test: v => v > 5e9, name:'市值>50亿', fail:'市值过小' },
        ];
        scoreRules = [
          { field:'f9', group:'PE', weight:35, score: v => Math.max(0, 35 - v * 1.2), desc:'PE越低越好（PEx1.2扣分）' },
          { field:'f23', group:'PB', weight:20, score: v => v > 0 ? Math.max(0, 20 - v * 3) : 5, desc:'PB越低越好' },
          { field:'f37', group:'股息', weight:20, score: v => v > 0.5 ? Math.min(20, v * 4) : v > 0 ? 5 : 0, desc:'有股息加分' },
          { field:'f62', group:'资金', weight:15, score: v => v > -300 ? Math.min(15, (v + 300) / 200) : 0, desc:'资金面' },
          { field:'f20', group:'规模', weight:10, score: v => v > 50e8 ? Math.min(10, Math.log10(v / 1e8) - 2) : 2, desc:'龙头规模' },
        ];
      } else if (kw.includes('趋势') || kw.includes('均线') || kw.includes('多头')) {
        strategyName = '趋势跟踪策略';
        resultColumns = ['名称','代码','现价','涨跌幅','量比','换手率','主力净流入','市值'];
        sortColumns = ['涨跌幅','换手率'];
        hardFilters = [
          { field:'f3', test: v => v > 1, name:'上涨趋势', fail:'未上涨' },
          { field:'f10', test: v => v > 0.6, name:'量比>0.6', fail:'量能不足' },
        ];
        scoreRules = [
          { field:'f3', group:'趋势', weight:30, score: v => Math.min(30, v * 2.5), desc:'趋势强度' },
          { field:'f62', group:'资金', weight:25, score: v => v > 0 ? Math.min(25, v / 600 + 2) : v > -500 ? 5 : 0, desc:'主力净流入' },
          { field:'f10', group:'量能', weight:20, score: v => Math.min(20, v * 4), desc:'量能配合' },
          { field:'f8', group:'活跃', weight:15, score: v => v > 1 && v < 25 ? Math.min(15, v * 0.8) : 3, desc:'换手活跃' },
          { field:'f9', group:'估值', weight:10, score: v => v > 0 && v < 80 ? Math.max(0, 10 - v * 0.1) : 0, desc:'估值不过高' },
        ];
      } else if (kw.includes('突破') || kw.includes('平台') || kw.includes('新高')) {
        strategyName = '平台突破策略';
        resultColumns = ['名称','代码','现价','涨跌幅','量比','换手率','主力净流入','市值'];
        sortColumns = ['量比','涨跌幅'];
        hardFilters = [
          { field:'f3', test: v => v > 3, name:'强势突破', fail:'涨幅不足' },
          { field:'f10', test: v => v > 1.2, name:'放量突破', fail:'量比不足' },
        ];
        scoreRules = [
          { field:'f10', group:'量能', weight:30, score: v => Math.min(30, v * 5), desc:'放量程度' },
          { field:'f3', group:'强度', weight:25, score: v => Math.min(25, v * 2.5), desc:'突破强度' },
          { field:'f62', group:'资金', weight:25, score: v => v > 2000 ? Math.min(25, v / 400) : v > 0 ? v / 200 : 0, desc:'主力大资金' },
          { field:'f8', group:'换手', weight:10, score: v => v > 3 && v < 25 ? Math.min(10, v * 0.5) : 3, desc:'换手充分' },
          { field:'f20', group:'规模', weight:10, score: v => v > 2e9 ? Math.min(10, Math.log10(v / 1e8) - 0.5) : 2, desc:'非微型股' },
        ];
      } else if (kw.includes('超预期') || kw.includes('财报') || kw.includes('营收') || kw.includes('业绩')) {
        strategyName = '业绩驱动策略';
        resultColumns = ['名称','代码','现价','涨跌幅','主力净流入','量比','市盈率','总市值'];
        sortColumns = ['涨跌幅','主力净流入'];
        hardFilters = [
          { field:'f3', test: v => v > 2, name:'市场认可', fail:'未获认可' },
          { field:'f9', test: v => v > 0, name:'盈利', fail:'亏损' },
        ];
        scoreRules = [
          { field:'f3', group:'表现', weight:30, score: v => Math.min(30, v * 3), desc:'市场表现分' },
          { field:'f62', group:'资金', weight:30, score: v => v > 500 ? Math.min(30, v / 400) : Math.max(0, v / 200 + 3), desc:'主力资金流向' },
          { field:'f10', group:'活跃', weight:20, score: v => v > 0.6 ? Math.min(20, v * 5) : 0, desc:'成交活跃度' },
          { field:'f9', group:'估值', weight:10, score: v => v < 100 ? Math.max(0, 10 - v * 0.1) : 0, desc:'估值空间' },
          { field:'f20', group:'规模', weight:10, score: v => v > 3e9 ? Math.min(10, Math.log10(v / 1e8) - 1) : 3, desc:'企业规模' },
        ];
      } else if (kw.includes('网格') || kw.includes('etf')) {
        strategyName = 'ETF网格策略';
        resultColumns = ['名称','代码','现价','涨跌幅','换手率','市值'];
        sortColumns = ['换手率'];
        hardFilters = [
          { field:'f8', test: v => v > 1, name:'有流动性', fail:'流动性差' },
        ];
        scoreRules = [
          { field:'f8', group:'流动性', weight:40, score: v => Math.min(40, v * 3), desc:'流动性分' },
          { field:'f3', group:'波动', weight:40, score: v => Math.abs(v) < 10 ? Math.max(0, 40 - Math.abs(v) * 4) : 0, desc:'波动越平稳越适合网格' },
          { field:'f20', group:'规模', weight:20, score: v => v > 1e9 ? Math.min(20, Math.log10(v / 1e8)) : 2, desc:'规模分' },
        ];
      } else {
        // 通用量化筛选
        strategyName = '通用量化优选';
        resultColumns = ['名称','代码','现价','涨跌幅','主力净流入','量比','市盈率','总市值'];
        sortColumns = ['主力净流入','涨跌幅'];
        hardFilters = [
          { field:'f9', test: v => v > 0 && v < 150, name:'估值合理', fail:'估值异常' },
          { field:'f20', test: v => v > 5e8, name:'市值>5亿', fail:'市值过小' },
        ];
        scoreRules = [
          { field:'f62', group:'资金', weight:35, score: v => v > 0 ? Math.min(35, v / 1000 + 3) : Math.max(0, v / 1000 + 5), desc:'主力资金流' },
          { field:'f3', group:'动量', weight:20, score: v => Math.min(20, Math.max(-10, v * 2) + 10), desc:'动量分' },
          { field:'f9', group:'估值', weight:20, score: v => v > 0 ? Math.max(0, 20 - v * 0.25) : 0, desc:'估值分' },
          { field:'f10', group:'活跃', weight:15, score: v => v > 0.4 ? Math.min(15, v * 5) : 0, desc:'活跃度分' },
          { field:'f20', group:'规模', weight:10, score: v => Math.min(10, Math.log10(v / 1e8)), desc:'规模分' },
        ];
      }

      // 1. 硬性条件过滤
      const passed = stocks.filter(s => {
        for (const f of hardFilters) {
          if (!f.test(parseFloat(s[f.field]) || 0)) return false;
        }
        return true;
      });

      if (!passed.length) {
        document.getElementById('matchLoading').style.display = 'none';
        document.getElementById('matchResults').style.display = 'block';
        document.getElementById('matchCondition').textContent = '当前无股票通过硬性筛选条件';
        document.getElementById('matchEmpty').style.display = 'block';
        document.getElementById('matchTable').querySelector('tbody').innerHTML = '';
        return;
      }

      // 2. 评分
      const scored = passed.map(s => {
        let total = 0;
        const breakdown = [];
        for (const r of scoreRules) {
          const val = parseFloat(s[r.field]) || 0;
          const pts = r.score(val);
          total += pts;
          breakdown.push({ name: r.group, score: Math.round(pts) });
        }
        return { ...s, _score: Math.round(Math.min(100, total)), _breakdown: breakdown };
      }).sort((a, b) => b._score - a._score).slice(0, 25);

      // 3. 生成筛选说明
      const hfDesc = hardFilters.map(f => f.name).join(' + ');
      const condDesc = `硬条件：${hfDesc} | 评分维度：${scoreRules.map(r => r.group + '(' + r.weight + '%)').join('、')}`;
      document.getElementById('matchCondition').textContent = `${condDesc} | 结果 ${scored.length}只`;

      // 4. 渲染
      document.getElementById('matchLoading').style.display = 'none';
      document.getElementById('matchResults').style.display = 'block';
      document.getElementById('matchEmpty').style.display = 'none';

      const thead = document.getElementById('matchTable').querySelector('thead tr');
      thead.innerHTML = resultColumns.map(c => `<th>${c}</th>`).join('') + '<th>评分</th><th>满足条件</th>';

      const totalPts = scoreRules.reduce((s, r) => s + r.weight, 0);

      const tbody = document.getElementById('matchTable').querySelector('tbody');
      tbody.innerHTML = scored.map(s => {
        const code = s.f12 || '';
        const name = s.f14 || '';
        const price = parseFloat(s.f2 || 0).toFixed(2);
        const marketTag = code.startsWith('6') ? 'sh' : 'sz';
        const url = `https://quote.eastmoney.com/${marketTag}${code}.html`;

        // 条件满足情况
        const hfChecks = hardFilters.map(f => {
          const ok = f.test(parseFloat(s[f.field]) || 0);
          return `<span style="font-size:0.7rem;padding:1px 5px;border-radius:3px;margin:1px;
            background:${ok?'#e8f5e9':'#ffebee'};color:${ok?'#2e7d32':'#c62828'};"
            title="${ok?'✓ '+f.name:'✗ '+f.fail}">${ok?'✅':'❌'}</span>`;
        }).join('');

        return `<tr style="cursor:pointer;" onclick="window.open('${url}','_blank')" title="点击打开东方财富详情">
          ${resultColumns.map(col => {
            if (col === '名称') return `<td><strong>${name}</strong></td>`;
            if (col === '代码') return `<td style="font-size:0.8rem;color:var(--text-light);">${code}</td>`;
            if (col === '现价') return `<td>${price}</td>`;
            if (col === '涨跌幅' || col === '跌幅') return `<td>${fmtPct(s.f3)}</td>`;
            if (col === '主力净流入') {
              const v = parseFloat(s.f62 || 0);
              const cls = v > 0 ? 'up' : (v < 0 ? 'down' : '');
              return `<td><span class="${cls}">${fmtNum(s.f62)}</span></td>`;
            }
            if (col === '量比') return `<td>${(parseFloat(s.f10) || 0).toFixed(2)}</td>`;
            if (col === '市盈率' || col === 'PE') return `<td>${fmtPE(s.f9)}</td>`;
            if (col === '市净率') return `<td>${(parseFloat(s.f23) || 0).toFixed(2)}</td>`;
            if (col === '换手率') return `<td>${(parseFloat(s.f8) || 0).toFixed(2)}%</td>`;
            if (col === '总市值' || col === '市值') return `<td style="font-size:0.8rem;">${fmtNum(s.f20)}</td>`;
            if (col === '股息率') return `<td>${(parseFloat(s.f37) || 0).toFixed(2)}%</td>`;
            return '<td>-</td>';
          }).join('')}
          <td style="font-size:0.82rem;font-weight:600;color:${s._score>=60?'var(--success)':s._score>=30?'var(--warning)':'var(--text-light)'};">${s._score}分</td>
          <td style="font-size:0.7rem;white-space:nowrap;">${hfChecks}</td>
        </tr>`;
      }).join('');
    }

    // ---- 初始化 ----
    DB.initSampleData();
    renderStrategies();
  </script>
</body>
</html>
