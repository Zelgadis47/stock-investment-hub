<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>策略池 - 我的投资智库</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .strategy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .strategy-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 20px;
      transition: box-shadow 0.2s, transform 0.2s;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .strategy-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
    .strategy-card .s-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .strategy-card .s-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--primary);
      flex: 1;
    }
    .strategy-card .s-status {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 500;
      white-space: nowrap;
      margin-left: 8px;
    }
    .s-status.tracking { background: #e3f2fd; color: #1565c0; }
    .s-status.executed { background: #e8f5e9; color: #2e7d32; }
    .s-status.abandoned { background: #fce4ec; color: #c62828; }

    .strategy-card .s-logic {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: 12px;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .strategy-card .s-condition {
      font-size: 0.82rem;
      color: var(--text-light);
      background: var(--bg);
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
    }
    .strategy-card .s-condition::before { content: '适用条件：'; font-weight: 500; color: var(--text-secondary); }
    .strategy-card .s-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-light);
      border-top: 1px solid var(--border-light);
      padding-top: 10px;
      margin-top: auto;
    }
    .strategy-card .s-actions { display: flex; gap: 6px; }
    .strategy-card .s-actions button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--text-light);
      padding: 3px 6px;
      border-radius: 3px;
      transition: all 0.15s;
    }
    .strategy-card .s-actions .edit:hover { color: var(--accent); background: var(--accent-light); }
    .strategy-card .s-actions .del:hover { color: var(--danger); background: #ffebee; }
    .strategy-card .s-actions .match {
      color: var(--accent); font-weight: 500; font-size: 0.82rem;
      padding: 4px 10px; border: 1px solid var(--accent); border-radius: 12px;
    }
    .strategy-card .s-actions .match:hover { background: var(--accent); color: #fff; }

    /* Match results */
    .match-result-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .match-result-table th { background: var(--primary); color: #fff; padding: 10px 12px; text-align: left; font-weight: 500; font-size: 0.8rem; position: sticky; top: 0; z-index: 1; }
    .match-result-table th:first-child { border-radius: var(--radius-sm) 0 0 0; }
    .match-result-table th:last-child { border-radius: 0 var(--radius-sm) 0 0; }
    .match-result-table td { padding: 9px 12px; border-bottom: 1px solid var(--border-light); }
    .match-result-table tr:hover td { background: #f8fafc; }
    .match-result-table .up { color: var(--danger); font-weight: 500; }
    .match-result-table .down { color: var(--success); font-weight: 500; }

    .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .strategy-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">
      <div class="icon">📊</div>
      <span>我的投资智库</span>
    </div>
    <button class="hamburger" aria-label="菜单">☰</button>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="knowledge.html">知识库</a>
      <a href="strategy.html" class="active">策略池</a>
      <a href="trade.html">交易复盘</a>
    </nav>
    <button class="btn-data" onclick="openModal('dataModal')" title="数据管理">💾</button>
  </header>

  <main class="container">
    <div class="section-header">
      <h2>📋 策略池</h2>
      <div class="actions">
        <button class="btn btn-primary" onclick="openAddModal()">＋ 新增策略</button>
      </div>
    </div>

    <!-- Filter & Search -->
    <div class="filter-bar">
      <select id="statusFilter" onchange="renderStrategies()">
        <option value="全部">全部状态</option>
        <option value="跟踪中">跟踪中</option>
        <option value="已执行">已执行</option>
        <option value="已废弃">已废弃</option>
      </select>
      <input type="text" id="searchInput" placeholder="搜索策略名称或逻辑关键词…" oninput="renderStrategies()">
    </div>

    <!-- Grid -->
    <div class="strategy-grid" id="strategyGrid"></div>
  </main>

  <!-- ===== Add / Edit Strategy Modal ===== -->
  <div class="modal-overlay" id="strategyModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="strategyModalTitle">新增策略</h3>
        <button class="modal-close" onclick="closeModal('strategyModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>策略名称</label>
          <input type="text" id="strategyName" placeholder="例如：低估值龙头定投策略">
        </div>
        <div class="form-group">
          <label>核心逻辑（一句话概括）</label>
          <textarea id="strategyLogic" rows="3" placeholder="描述策略的核心思路和操作规则"></textarea>
        </div>
        <div class="form-group">
          <label>适用条件</label>
          <textarea id="strategyCondition" rows="2" placeholder="该策略在什么市场环境下有效？"></textarea>
        </div>
        <div class="form-group">
          <label>当前状态</label>
          <select id="strategyStatus">
            <option value="跟踪中">跟踪中</option>
            <option value="已执行">已执行</option>
            <option value="已废弃">已废弃</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('strategyModal')">取消</button>
        <button class="btn btn-primary" onclick="saveStrategy()">保存</button>
      </div>
    </div>
  </div>

  <!-- ===== 匹配股票模态框 ===== -->
  <div class="modal-overlay" id="matchModal">
    <div class="modal" style="max-width:780px;">
      <div class="modal-header">
        <h3>🔍 <span id="matchTitle">策略匹配</span></h3>
        <button class="modal-close" onclick="closeModal('matchModal')">✕</button>
      </div>
      <div class="modal-body">
        <div id="matchLoading" style="text-align:center;padding:40px;">
          <span class="loading-spinner"></span> 正在从市场筛选符合条件的股票...
        </div>
        <div id="matchResults" style="display:none;">
          <div style="font-size:0.85rem;color:var(--text-light);margin-bottom:8px;">
            筛选条件：<span id="matchCondition" style="color:var(--text);font-weight:500;"></span>
          </div>
          <div style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:12px;">
            数据来源：东方财富，结果仅供参考，不构成投资建议。点击行可查看详情。
          </div>
          <div style="max-height:420px;overflow:auto;border:1px solid var(--border);border-radius:var(--radius-sm);">
            <table class="match-result-table" id="matchTable">
              <thead><tr><th>名称</th><th>代码</th><th>最新价</th><th>涨跌幅</th><th>关键指标</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
          <div id="matchEmpty" class="empty-state" style="display:none;padding:24px;">
            <div class="icon">📭</div><p>当前市场暂未找到符合条件股票</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- ===== 数据管理模态框 ===== -->
  <div class="modal-overlay" id="dataModal">
    <div class="modal" style="max-width:480px;">
      <div class="modal-header">
        <h3>💾 数据管理</h3>
        <button class="modal-close" onclick="closeModal('dataModal')">✕</button>
      </div>
      <div class="modal-body">
        <p class="data-info">
          <b>🌐 自动同步</b>：页面右下角有同步状态指示器，点击可配置同步服务器地址。<br>
          <b>📁 手动传输</b>：如不使用同步服务器，可通过下方导出/导入迁移数据。
        </p>
        <div class="data-actions">
          <button class="btn btn-primary" onclick="closeModal('dataModal');exportAllData();">
            <span class="btn-icon">⬇️</span><br>导出数据
          </button>
          <button class="btn btn-outline" onclick="closeModal('dataModal');importAllData();">
            <span class="btn-icon">⬆️</span><br>导入数据
          </button>
        </div>
        <div class="data-warn">⚠️ 导入数据将覆盖当前设备上的所有数据，建议先导出备份再导入。</div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let editingStrategyId = null;

    function renderStrategies() {
      const statusFilter = document.getElementById('statusFilter').value;
      const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

      let list = DB.getStrategies();
      if (statusFilter !== '全部') list = list.filter(s => s.status === statusFilter);
      if (keyword) list = list.filter(s =>
        s.name.toLowerCase().includes(keyword) ||
        (s.logic && s.logic.toLowerCase().includes(keyword))
      );

      const grid = document.getElementById('strategyGrid');
      if (list.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="icon">📋</div><p>暂无策略</p></div>';
        return;
      }

      const statusMap = { '跟踪中': 'tracking', '已执行': 'executed', '已废弃': 'abandoned' };
      grid.innerHTML = list.map(s => `
        <div class="strategy-card">
          <div class="s-header">
            <div class="s-name">${s.name}</div>
            <span class="s-status ${statusMap[s.status] || 'tracking'}">${s.status}</span>
          </div>
          <div class="s-logic">${s.logic || '暂无描述'}</div>
          ${s.condition ? `<div class="s-condition">${s.condition}</div>` : ''}
          <div class="s-footer">
            <span>创建于 ${fmtDate(s.createdAt)}</span>
            <div class="s-actions">
              <button class="match" onclick="event.stopPropagation();matchStrategy('${s.id}')">🔍 匹配</button>
              <button class="edit" onclick="editStrategy('${s.id}')">✏️</button>
              <button class="del" onclick="deleteStrategy('${s.id}')">🗑️</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openAddModal() {
      editingStrategyId = null;
      document.getElementById('strategyModalTitle').textContent = '新增策略';
      document.getElementById('strategyName').value = '';
      document.getElementById('strategyLogic').value = '';
      document.getElementById('strategyCondition').value = '';
      document.getElementById('strategyStatus').value = '跟踪中';
      openModal('strategyModal');
      setTimeout(() => document.getElementById('strategyName').focus(), 100);
    }

    function editStrategy(id) {
      const list = DB.getStrategies();
      const s = list.find(item => item.id === id);
      if (!s) return;
      editingStrategyId = id;
      document.getElementById('strategyModalTitle').textContent = '编辑策略';
      document.getElementById('strategyName').value = s.name;
      document.getElementById('strategyLogic').value = s.logic || '';
      document.getElementById('strategyCondition').value = s.condition || '';
      document.getElementById('strategyStatus').value = s.status;
      openModal('strategyModal');
    }

    function saveStrategy() {
      const name = document.getElementById('strategyName').value.trim();
      const logic = document.getElementById('strategyLogic').value.trim();
      const condition = document.getElementById('strategyCondition').value.trim();
      const status = document.getElementById('strategyStatus').value;

      if (!name) { showToast('请输入策略名称'); return; }
      if (!logic) { showToast('请输入策略核心逻辑'); return; }

      if (editingStrategyId) {
        DB.updateStrategy(editingStrategyId, { name, logic, condition, status });
        showToast('策略已更新');
      } else {
        DB.addStrategy({ name, logic, condition, status });
        showToast('策略已添加');
      }
      closeModal('strategyModal');
      renderStrategies();
    }

    function deleteStrategy(id) {
      if (!confirm('确定要删除这个策略吗？')) return;
      DB.deleteStrategy(id);
      renderStrategies();
      showToast('策略已删除');
    }

    // ===== 策略匹配股票（多因子量化筛选） =====

    // 东方财富 API 字段说明
    // f2:最新价 f3:涨跌幅 f4:涨跌额 f5:成交量 f6:成交额
    // f8:换手率 f9:市盈率(动态) f10:量比 f12:代码 f14:名称
    // f15:最高 f16:最低 f17:今开 f18:昨收
    // f20:总市值 f21:流通市值 f23:市净率
    // f37:股息率 f62:主力净流入(万元)

    const CACHE_TTL = 180000; // 3分钟缓存

    async function fetchStockData(cacheKey) {
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        const { data, ts } = JSON.parse(cached);
        if (Date.now() - ts < CACHE_TTL) return data;
      }
      // 获取全市场A股数据（所有关键字段）
      const fields = 'f2,f3,f4,f8,f9,f10,f12,f14,f20,f23,f37,f62';
      const url = `https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=500&po=0&np=1&fltt=2&invt=2&fid=f3&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23&fields=${fields}&_=${Date.now()}`;
      try {
        const resp = await fetch(url);
        const text = await resp.text();
        const json = JSON.parse(text);
        const data = json?.data?.diff || [];
        localStorage.setItem(cacheKey, JSON.stringify({ data, ts: Date.now() }));
        return data;
      } catch(e) { return []; }
    }

    function fmtPct(v) {
      const n = parseFloat(v);
      if (isNaN(n)) return '-';
      const cls = n > 0 ? 'up' : (n < 0 ? 'down' : '');
      return `<span class="${cls}">${n > 0 ? '+' : ''}${n.toFixed(2)}%</span>`;
    }

    function fmtNum(v, unit = '') {
      const n = parseFloat(v);
      if (isNaN(n)) return '-';
      if (Math.abs(n) >= 1e8) return (n / 1e8).toFixed(2) + '亿' + unit;
      if (Math.abs(n) >= 1e4) return (n / 1e4).toFixed(2) + '万' + unit;
      return n.toFixed(1) + unit;
    }

    function fmtPE(v) { const n = parseFloat(v); return n > 0 ? n.toFixed(1) : '—'; }

    // 多因子评分引擎
    function scoreStock(stock, rules) {
      let score = 0;
      for (const rule of rules) {
        const val = parseFloat(stock[rule.field]) || 0;
        if (rule.condition(val)) score += rule.weight;
      }
      return score;
    }

    function matchStrategy(id) {
      const list = DB.getStrategies();
      const s = list.find(item => item.id === id);
      if (!s) return;
      document.getElementById('matchTitle').textContent = s.name + ' — 匹配股票';
      document.getElementById('matchCondition').textContent = s.logic || '通用筛选';
      document.getElementById('matchLoading').style.display = 'block';
      document.getElementById('matchResults').style.display = 'none';
      openModal('matchModal');
      doMatch(s.name, s.logic || '');
    }

    async function doMatch(name, logic) {
      const stocks = await fetchStockData('full_stock_data');
      if (!stocks.length) {
        document.getElementById('matchLoading').innerHTML = '<p style="color:var(--danger);">❌ 数据获取失败，请稍后重试</p>';
        return;
      }

      const kw = (name + logic).toLowerCase();
      let rules, resultColumns;

      // ===== 策略匹配规则定义 =====
      if (kw.includes('超跌') || kw.includes('回调')) {
        // 超跌反弹：跌幅大 + 资金流入 + 量能配合
        resultColumns = ['名称','代码','现价','跌幅','主力净流入','量比','PE','换手率'];
        rules = [
          { field:'f3', condition: v => v < -5, weight: 20 - Math.abs(v) * 1.5, desc:'跌幅大' },
          { field:'f62', condition: v => v > 500, weight: Math.min(v / 1000, 15), desc:'主力净流入' },
          { field:'f10', condition: v => v > 0.7, weight: Math.min(v * 3, 10), desc:'量比活跃' },
          { field:'f9', condition: v => v > 0 && v < 100, weight: 5, desc:'PE合理' },
          { field:'f8', condition: v => v < 15, weight: 3, desc:'换手率适中' },
        ];
      } else if (kw.includes('股息') || kw.includes('红利')) {
        resultColumns = ['名称','代码','现价','股息率','市值','主力净流入','PE'];
        rules = [
          { field:'f37', condition: v => v > 2, weight: v * 3, desc:'股息率高' },
          { field:'f20', condition: v => v > 1e9, weight: 8, desc:'市值大' },
          { field:'f9', condition: v => v > 0 && v < 20, weight: 5, desc:'低估值' },
          { field:'f62', condition: v => v > -500, weight: 3, desc:'资金面不差' },
        ];
      } else if (kw.includes('低估值') || kw.includes('市盈率') || kw.includes('pe')) {
        resultColumns = ['名称','代码','现价','PE','市值','主力净流入','股息率','涨跌幅'];
        rules = [
          { field:'f9', condition: v => v > 0 && v < 30, weight: 25 - v * 0.6, desc:'PE低' },
          { field:'f20', condition: v => v > 5e9, weight: 8, desc:'市值大' },
          { field:'f62', condition: v => v > -300, weight: 5, desc:'资金面' },
          { field:'f37', condition: v => v > 1, weight: v * 2, desc:'有股息' },
          { field:'f23', condition: v => v > 0 && v < 5, weight: 4, desc:'PB合理' },
        ];
      } else if (kw.includes('趋势') || kw.includes('均线') || kw.includes('上升')) {
        resultColumns = ['名称','代码','现价','涨跌幅','主力净流入','量比','换手率','PE'];
        rules = [
          { field:'f3', condition: v => v > 2, weight: v * 1.2, desc:'趋势向上' },
          { field:'f62', condition: v => v > 1000, weight: Math.min(v / 800, 12), desc:'主力流入' },
          { field:'f10', condition: v => v > 0.8, weight: Math.min(v * 4, 10), desc:'量能配合' },
          { field:'f8', condition: v => v > 2 && v < 20, weight: 5, desc:'交投活跃' },
          { field:'f9', condition: v => v > 0 && v < 80, weight: 3, desc:'估值不过高' },
        ];
      } else if (kw.includes('突破') || kw.includes('新高')) {
        resultColumns = ['名称','代码','现价','涨跌幅','主力净流入','量比','市值','换手率'];
        rules = [
          { field:'f3', condition: v => v > 4, weight: v * 1.5, desc:'强势突破' },
          { field:'f62', condition: v => v > 2000, weight: Math.min(v / 500, 15), desc:'主力大额流入' },
          { field:'f10', condition: v => v > 1.0, weight: Math.min(v * 5, 12), desc:'放量突破' },
          { field:'f8', condition: v => v > 3 && v < 25, weight: 5, desc:'换手充分' },
          { field:'f20', condition: v => v > 3e9, weight: 3, desc:'非微盘股' },
        ];
      } else if (kw.includes('超预期') || kw.includes('财报') || kw.includes('营收') || kw.includes('业绩')) {
        resultColumns = ['名称','代码','现价','涨跌幅','主力净流入','量比','市值','PE'];
        rules = [
          { field:'f3', condition: v => v > 3, weight: v * 1, desc:'市场认可' },
          { field:'f62', condition: v => v > 800, weight: Math.min(v / 600, 12), desc:'主力净流入' },
          { field:'f10', condition: v => v > 0.8, weight: Math.min(v * 3, 8), desc:'成交活跃' },
          { field:'f20', condition: v => v > 2e9, weight: 5, desc:'有一定规模' },
          { field:'f9', condition: v => v > 0 && v < 100, weight: 3, desc:'PE合理' },
        ];
      } else if (kw.includes('网格') || kw.includes('etf')) {
        resultColumns = ['名称','代码','现价','涨跌幅','换手率','市值'];
        rules = [
          { field:'f8', condition: v => v > 1 && v < 30, weight: 10, desc:'流动性好' },
          { field:'f3', condition: v => Math.abs(v) < 8, weight: 8 - Math.abs(v) * 0.3, desc:'波动适中' },
        ];
      } else {
        // 通用：结合资金面 + 基本面
        resultColumns = ['名称','代码','现价','涨跌幅','主力净流入','PE','市值','换手率'];
        rules = [
          { field:'f3', condition: v => true, weight: 5, desc:'关注度' },
          { field:'f62', condition: v => v > 0, weight: Math.min(v / 500, 15), desc:'主力净流入' },
          { field:'f9', condition: v => v > 0 && v < 80, weight: 8, desc:'PE合理' },
          { field:'f20', condition: v => v > 1e9, weight: 5, desc:'有一定规模' },
        ];
      }

      // 评分并排序
      const scored = stocks
        .map(s => ({ ...s, _score: scoreStock(s, rules) }))
        .filter(s => s._score > 0)
        .sort((a, b) => b._score - a._score)
        .slice(0, 25);

      // 渲染筛选条件说明
      const condDesc = rules.map(r => r.desc).join(' + ');
      document.getElementById('matchCondition').textContent = `${condDesc}（综合评分排序，共${scored.length}只）`;

      // 渲染结果
      document.getElementById('matchLoading').style.display = 'none';
      document.getElementById('matchResults').style.display = 'block';

      if (!scored.length) {
        document.getElementById('matchTable').querySelector('tbody').innerHTML = '';
        document.getElementById('matchEmpty').style.display = 'block';
        return;
      }

      document.getElementById('matchEmpty').style.display = 'none';

      // 更新表头
      const thead = document.getElementById('matchTable').querySelector('thead tr');
      thead.innerHTML = resultColumns.map(c => `<th>${c}</th>`).join('') + '<th>评分</th>';

      // 填充数据
      const tbody = document.getElementById('matchTable').querySelector('tbody');
      tbody.innerHTML = scored.map(s => {
        const code = s.f12 || '';
        const name = s.f14 || '';
        const price = parseFloat(s.f2 || 0).toFixed(2);
        const marketTag = code.startsWith('6') ? 'sh' : 'sz';
        const url = `https://quote.eastmoney.com/${marketTag}${code}.html`;
        const rating = '⭐'.repeat(Math.min(5, Math.round(s._score / 3)));

        return `<tr style="cursor:pointer;" onclick="window.open('${url}','_blank')" title="点击打开东方财富详情">
          ${resultColumns.map(col => {
            if (col === '名称') return `<td><strong>${name}</strong></td>`;
            if (col === '代码') return `<td style="font-size:0.8rem;color:var(--text-light);">${code}</td>`;
            if (col === '现价') return `<td>${price}</td>`;
            if (col === '涨跌幅' || col === '跌幅') return `<td>${fmtPct(s.f3)}</td>`;
            if (col === '主力净流入') {
              const v = parseFloat(s.f62 || 0);
              const cls = v > 0 ? 'up' : (v < 0 ? 'down' : '');
              return `<td><span class="${cls}">${fmtNum(s.f62)}</span></td>`;
            }
            if (col === '量比') return `<td>${(parseFloat(s.f10) || 0).toFixed(2)}</td>`;
            if (col === 'PE') return `<td>${fmtPE(s.f9)}</td>`;
            if (col === '换手率') return `<td>${(parseFloat(s.f8) || 0).toFixed(2)}%</td>`;
            if (col === '市值') return `<td style="font-size:0.8rem;">${fmtNum(s.f20)}</td>`;
            if (col === '股息率') return `<td>${(parseFloat(s.f37) || 0).toFixed(2)}%</td>`;
            return '<td>-</td>';
          }).join('')}
          <td style="font-size:0.82rem;color:var(--warning);">${rating}</td>
        </tr>`;
      }).join('');
    }

    // ---- 初始化 ----
    DB.initSampleData();
    renderStrategies();
  </script>
</body>
</html>
