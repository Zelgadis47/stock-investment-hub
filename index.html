<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的投资智库</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .chart-card { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; box-shadow: var(--shadow); }
    .chart-card h3 { font-size: 0.95rem; margin-bottom: 10px; color: var(--primary); display: flex; align-items: center; justify-content: space-between; }
    .chart-card .period-tabs { display: flex; gap: 4px; font-size: 0.78rem; }
    .chart-card .period-tabs span { padding: 2px 10px; border-radius: 10px; cursor: pointer; color: var(--text-light); }
    .chart-card .period-tabs span.active { background: var(--accent); color: #fff; }
    .chart-container { height: 260px; }
    .mini-chart { height: 200px; }
    .alert-panel { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; box-shadow: var(--shadow); }
    .alert-panel h3 { font-size: 0.95rem; margin-bottom: 10px; color: var(--primary); }
    .alert-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 6px; font-size: 0.85rem; }
    .alert-item.danger { background: #ffebee; }
    .alert-item.warning { background: #fff8e1; }
    .alert-item.safe { background: #e8f5e9; }
    @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">
      <div class="icon">📊</div>
      <span>我的投资智库</span>
    </div>
    <button class="hamburger" aria-label="菜单">☰</button>
    <nav class="nav" id="mainNav">
      <a href="index.html" class="active">首页</a>
      <a href="knowledge.html">知识库</a>
      <a href="strategy.html">策略池</a>
      <a href="portfolio.html">持仓管理</a>
      <a href="watchlist.html">自选股</a>
      <a href="trade.html">交易复盘</a>
    </nav>
    <button class="btn-data" onclick="openModal('dataModal')" title="数据管理">💾</button>
  </header>

  <main class="container" id="app">
    <!-- 统计卡片 -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="label">知识文章</div><div class="value" id="statArticles">0</div><div class="icon-bg">📚</div></div>
      <div class="stat-card"><div class="label">策略总数</div><div class="value" id="statStrategies">0</div><div class="icon-bg">📋</div></div>
      <div class="stat-card"><div class="label">交易记录</div><div class="value" id="statTrades">0</div><div class="icon-bg">📈</div></div>
      <div class="stat-card"><div class="label">自选股</div><div class="value" id="statWatchlist">0</div><div class="icon-bg">👁️</div></div>
    </div>

    <!-- 数据看板 -->
    <div class="dashboard-grid">
      <!-- 净值曲线 -->
      <div class="chart-card" style="grid-column: 1 / -1;">
        <h3>
          📈 持仓净值曲线
          <div class="period-tabs">
            <span data-period="7" onclick="renderNetCurve(7)">7天</span>
            <span data-period="30" class="active" onclick="renderNetCurve(30)">30天</span>
            <span data-period="0" onclick="renderNetCurve(0)">全部</span>
          </div>
        </h3>
        <div class="chart-container" id="netCurveChart"></div>
      </div>

      <!-- 资产配置 -->
      <div class="chart-card">
        <h3>🥧 资产配置</h3>
        <div class="chart-container mini-chart" id="assetPieChart"></div>
      </div>

      <!-- 近期提醒 -->
      <div class="alert-panel">
        <h3>🔔 近期提醒</h3>
        <div id="alertList"></div>
      </div>
    </div>

    <!-- 最近更新 -->
    <section>
      <div class="section-header">
        <h2>最近更新</h2>
        <div class="actions"><a href="knowledge.html" class="btn btn-outline btn-sm">查看全部</a></div>
      </div>
      <div class="card" style="padding:0;"><div id="recentList" style="min-height:60px;"></div></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <div class="modal-overlay" id="dataModal">
    <div class="modal" style="max-width:480px;">
      <div class="modal-header"><h3>💾 数据管理</h3><button class="modal-close" onclick="closeModal('dataModal')">✕</button></div>
      <div class="modal-body">
        <p class="data-info"><b>🌐 自动同步</b>：页面右下角点同步按钮，输入 GitHub Token 即可开启跨设备云同步。<br><b>📁 手动传输</b>：也可通过下方导出/导入在设备间迁移数据。</p>
        <div class="data-actions">
          <button class="btn btn-primary" onclick="closeModal('dataModal');exportAllData();"><span class="btn-icon">⬇️</span><br>导出数据</button>
          <button class="btn btn-outline" onclick="closeModal('dataModal');importAllData();"><span class="btn-icon">⬆️</span><br>导入数据</button>
        </div>
        <div class="data-warn">⚠️ 导入数据将覆盖当前设备上的所有数据，建议先导出备份再导入。</div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/charts.js"></script>
  <script>
    let priceCache = {};

    async function fetchIndexPrice() {
      // 沪深300：secid=1.000300
      const url = `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=1.000300&fields1=f1,f2,f3&fields2=f51,f53&klt=101&fqt=1&end=20500101&lmt=30&_=${Date.now()}`;
      try {
        const resp = await fetch(url);
        const json = await resp.json();
        return json?.data?.klines?.map(k => {
          const [date, close] = k.split(',');
          return { date, close: parseFloat(close) };
        }) || [];
      } catch(e) { return []; }
    }

    function renderDashboard() {
      DB.initSampleData();
      const stats = DB.getStats();
      document.getElementById('statArticles').textContent = stats.articleCount;
      document.getElementById('statStrategies').textContent = stats.strategyCount;
      document.getElementById('statTrades').textContent = stats.tradeCount;
      document.getElementById('statWatchlist').textContent = stats.watchlistCount;

      // 最近更新
      const list = document.getElementById('recentList');
      if (!stats.recentUpdates.length) {
        list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>还没有内容</p></div>';
      } else {
        let html = '<div style="padding:4px 0;">';
        stats.recentUpdates.forEach(item => {
          let badge, link;
          if (item.type === 'article') {
            badge = '<span style="background:#e3f2fd;color:#1565c0;padding:2px 10px;border-radius:10px;font-size:0.78rem;">知识</span>';
            link = 'knowledge.html';
          } else {
            badge = '<span style="background:#f3e5f5;color:#7b1fa2;padding:2px 10px;border-radius:10px;font-size:0.78rem;">策略</span>';
            link = 'strategy.html';
          }
          html += `<a href="${link}" style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border-light);text-decoration:none;color:var(--text);">
            <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;">
              ${badge}
              <span style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.title}</span>
            </div>
            <span style="color:var(--text-light);font-size:0.8rem;white-space:nowrap;margin-left:12px;">${fmtDateTime(item.time)}</span>
          </a>`;
        });
        html += '</div>';
        list.innerHTML = html;
      }

      renderAlertPanel();
      renderAssetPie();
      renderNetCurve(30);
    }

    function renderAlertPanel() {
      const watchlist = DB.getWatchlist();
      const el = document.getElementById('alertList');
      if (!watchlist.length) {
        el.innerHTML = '<p style="color:var(--text-light);font-size:0.85rem;text-align:center;padding:20px;">暂无自选股提醒</p>';
        return;
      }
      // 简化展示：列出所有启用提醒的自选股
      const alerted = watchlist.filter(w => w.alertEnabled && (w.targetPrice || w.stopLossPrice));
      if (!alerted.length) {
        el.innerHTML = '<p style="color:var(--text-light);font-size:0.85rem;text-align:center;padding:20px;">暂无启用提醒的自选股</p>';
        return;
      }
      el.innerHTML = alerted.map(w => {
        const price = priceCache[w.stockCode]?.price || w.addPrice || 0;
        let cls = 'safe', msg = '';
        if (w.targetPrice && price >= w.targetPrice * 0.95) { cls = 'warning'; msg = `接近目标价 ¥${w.targetPrice}`; }
        if (w.targetPrice && price >= w.targetPrice) { cls = 'danger'; msg = `已达目标价！`; }
        if (w.stopLossPrice && price <= w.stopLossPrice * 1.05) { cls = 'warning'; msg = `接近止损价 ¥${w.stopLossPrice}`; }
        if (w.stopLossPrice && price <= w.stopLossPrice) { cls = 'danger'; msg = `已跌破止损价！`; }
        if (!msg) { msg = `现价 ¥${price.toFixed(2)}，运行正常`; }
        return `<div class="alert-item ${cls}">
          <div><strong>${w.stockName}</strong> <span style="color:var(--text-light);font-size:0.78rem;">${w.stockCode}</span></div>
          <div style="font-size:0.82rem;">${msg}</div>
        </div>`;
      }).join('');
    }

    function renderAssetPie() {
      const snap = DB.getLatestSnapshot();
      if (!snap) {
        document.getElementById('assetPieChart').innerHTML = '<p style="color:var(--text-light);font-size:0.85rem;text-align:center;padding:40px;">暂无持仓数据</p>';
        return;
      }
      const totalMarketValue = snap.positions?.reduce((s, p) => s + (p.marketValue || 0), 0) || 0;
      Charts.pie('assetPieChart', [
        { name: '股票', value: parseFloat(totalMarketValue.toFixed(0)) },
        { name: '现金', value: parseFloat((snap.cash || 0).toFixed(0)) },
      ], { colors: ['#1e88e5', '#00c853'], radius: ['45%', '70%'] });
    }

    async function renderNetCurve(days) {
      // 高亮选中tab
      document.querySelectorAll('.period-tabs span').forEach(s => s.classList.remove('active'));
      event?.target?.classList?.add('active');

      const snapshots = DB.getSnapshots().sort((a, b) => new Date(a.date) - new Date(b.date));
      let data = snapshots;
      if (days > 0) data = data.slice(-days);

      if (!data.length) {
        document.getElementById('netCurveChart').innerHTML = '<p style="color:var(--text-light);font-size:0.85rem;text-align:center;padding:60px;">暂无净值数据，请先在持仓管理录入快照</p>';
        return;
      }

      const dates = data.map(s => s.date);
      const values = data.map(s => s.totalAssets);

      // 拉取沪深300基准
      let benchmark = [];
      try { benchmark = await fetchIndexPrice(); } catch(e) {}
      const startDate = dates[0];
      const benchFiltered = benchmark.filter(b => b.date >= startDate);
      const benchDates = benchFiltered.map(b => b.date);
      const benchValues = benchFiltered.map(b => b.close);

      // 对齐日期：用基准的首日作为起点归一化
      const netStart = values[0];
      const benchStart = benchValues[0] || 1;
      const netNormalized = values.map(v => parseFloat(((v / netStart - 1) * 100).toFixed(2)));
      const benchNormalized = benchValues.map(v => parseFloat(((v / benchStart - 1) * 100).toFixed(2)));

      // 合并日期（以净值日期为准，找最近的基准）
      const series = {
        dates,
        values: [
          { name: '我的净值', data: netNormalized, color: '#1e88e5' },
        ],
      };
      if (benchNormalized.length) {
        // 简单对齐：按索引
        const alignedBench = dates.map(d => {
          const idx = benchDates.indexOf(d);
          if (idx >= 0) return benchNormalized[idx];
          // 找最近的
          const closest = benchDates.reduce((prev, curr, i) => {
            return Math.abs(new Date(curr) - new Date(d)) < Math.abs(new Date(prev) - new Date(d)) ? curr : prev;
          }, benchDates[0]);
          const ci = benchDates.indexOf(closest);
          return ci >= 0 ? benchNormalized[ci] : null;
        }).filter(v => v !== null);
        series.values.push({ name: '沪深300', data: alignedBench, color: '#ffab00' });
      }

      Charts.line('netCurveChart', series, { yFormat: v => v.toFixed(1) + '%', area: true });
    }

    renderDashboard();
  </script>
</body>
</html>
